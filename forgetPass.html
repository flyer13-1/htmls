<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="a_css/formPage.css" />
    <script defer src="a_js/passCheck.js"></script>
    <script defer src="a_js/passConfirmChecl.js"></script>
    <script defer src="a_js/forgetPass.js"></script>
    <title>パスワード再設定</title>
  </head>
  <body>
    <header>
      <h1>OfficialSupportSystem</h1>
      <h2>パスワード再設定ページ</h2>
    </header>

    <main>
      <article id="formarea">
        <form method="post" id="form">
          <section>
            <label for="username">担当者名:</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              minlength="4"
              maxlength="20"
              pattern="[ぁ-んァ-ヶヲ-ン\u4E00-\u9FFF\u3400-\u4DBFー・]+"
              title="ひらがな・カタカナ・漢字で入力してください（4文字〜20文字以内）"
            />
          </section>

          <section>
            <label for="password">パスワード:</label>
            <input
              type="password"
              id="password"
              name="password"
              minlength="6"
              maxlength="20"
              required
            />
            <br />
            <small id="errMsg"></small>
          </section>

          <section>
            <label for="newPassword">新しいパスワード*:</label>
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              minlength="6"
              maxlength="30"
              required
            /><br />
            <small id="newPassErrMsg"></small>
          </section>

          <section>
            <label for="passConfirm">新しいパスワード確認*:</label>
            <input
              type="password"
              id="passConfirm"
              minlength="6"
              maxlength="30"
              required
            /><br />
            <small id="passConfError"></small>
          </section>

          <input type="submit" value="送信" id="submitBtn" disabled />
        </form>
      </article>

      <article id="msgarea">
        <p>パスワード再設定に成功！</p>
      </article>
    </main>
  </body>
</html>
